name: Subculture Curation Batch

on:
  schedule:
    - cron: '0 */3 * * *' # 3시간마다 실행
  workflow_dispatch:      # 수동 실행 버튼

permissions:
  contents: write

jobs:
  run_curation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Create GCP Credentials JSON
        run: echo "${{ secrets.GCP_CREDENTIALS }}" > gcp_key.json
        
      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python main.py

      - name: Commit and Push Archive Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hourly_archive/
          git commit -m "Auto-update Subculture Archive [skip ci]" || echo "No changes to commit"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying..."
            sleep 5
          done
